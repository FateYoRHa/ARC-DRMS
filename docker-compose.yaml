services:
  client:
    depends_on:
      - server
    build: ./client
    env_file:
      - ./client/.env
    ports:
      - 5173:5173
    develop:
      watch:
        - path: ./client/package.json
          action: rebuild
        - path: ./client/package-lock.json
          action: rebuild

        - path: ./client
          target: /app
          action: sync

  server:
    depends_on:
      - db
    build: ./server
    env_file:
      - ./server/.env
    ports:
      - 5000:5000
    develop:
      watch:
        - path: ./server/package.json
          action: rebuild
        - path: ./server/package-lock.json
          action: rebuild

        - path: ./server
          target: /app
          action: sync+restart

  db:
    image: postgres:latest
    ports: 
      - 5431:5432
    volumes:
      - ARCDRMS:/var/lib/postgresql/data

volumes:
  ARCDRMS: